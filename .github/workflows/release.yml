name: Release

# main에 머지(push)되면 Conventional Commits로 버전을 자동 판정해
# 버전 범프·CHANGELOG·git 태그·GitHub 릴리즈·npm publish 까지 자동으로 한다.
#   feat: → minor, fix:/perf: → patch, "BREAKING CHANGE:" → major
# 사전 준비: 저장소 Settings → Secrets → Actions 에 NPM_TOKEN 등록.
on:
  push:
    branches: [main]

# semantic-release가 태그/릴리즈 생성, CHANGELOG·package.json 커밋 되돌림, npm provenance에 필요.
permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # semantic-release는 전체 히스토리+태그가 필요
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.14'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:run

      - name: Build
        run: pnpm build

      - name: Release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
