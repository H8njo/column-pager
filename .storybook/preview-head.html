<!--
  스크롤바 거터를 항상 예약한다.
  ColumnPager는 컨테이너 폭을 측정해 페이지네이션한다(슬라이스의 translateX도 컬럼 폭에 비례).
  내용이 길어져 세로 스크롤바가 "뒤늦게" 생기면 뷰포트 가용 폭이 스크롤바 너비만큼 줄어
  2차 페이지네이션이 일어나 슬라이스 translateX가 한 번 더 점프(더블 페인트)한다.
  거터를 미리 예약하면 폭이 안정적으로 유지되어 더블 페인트가 사라진다.
  (소비자 측에서도 스크롤 컨테이너에 scrollbar-gutter: stable 권장)

  html {
    scrollbar-gutter: stable;
